  'builder-util@26.11.0': patches/builder-util.patch # https://github.com/electron-userland/electron-builder/pull/9517
  gatemaker: patches/gatemaker.patch # https://github.com/javan/gatemaker/pull/4
  i18n: patches/i18n.patch # https://github.com/mashpie/i18n-node/pull/546, https://github.com/mashpie/i18n-node/pull/547
